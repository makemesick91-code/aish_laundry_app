name: aish_observability
description: >-
  Redacted diagnostics for the Aish Laundry App. Emits correlation identifier,
  application version and environment, and never a token, password, cookie or
  personal datum.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  aish_core: 0.1.0
  meta: 1.18.0

dev_dependencies:
  flutter_lints: 6.0.0
  test: 1.31.0
