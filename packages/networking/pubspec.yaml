name: aish_networking
description: >-
  HTTP client for the Aish Laundry App /api/v1 surface: request identifiers,
  backend error-envelope decoding and fail-safe mapping of unknown error codes.
  Never logs a token.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  aish_core: 0.1.0
  # The master-data repository returns DOMAIN types rather than raw maps, so a
  # surface cannot decode an envelope its own way. First-party workspace
  # package; the dependency runs one direction only (domain never imports
  # networking), so the graph stays acyclic.
  aish_domain: 0.1.0
  dio: 5.10.0
  meta: 1.18.0

dev_dependencies:
  flutter_lints: 6.0.0
  test: 1.31.0
