name: aish_auth
description: >-
  Authentication state machine for the Aish Laundry App. The backend remains the
  authorization authority; this package models the client's view of session and
  membership state only.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  aish_core: 0.1.0
  aish_domain: 0.1.0
  aish_local_storage: 0.1.0
  aish_networking: 0.1.0
  meta: 1.18.0

dev_dependencies:
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter
  test: 1.31.0
