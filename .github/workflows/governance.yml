---
# Aish Laundry App — governance gates.
#
# CHECK NAMES ARE PART OF THE CONTRACT. Branch protection references them, so
# neither the workflow `name:` nor any job `name:` may be renamed casually.
# Rendered check names produced by this file:
#   "Governance / validate"
#   "Governance / Documentation / links"
#   "Governance / Required Gate"
#
# REQUIRED GATE DESIGN — deliberate choice, read before editing:
#   A job may only `needs:` jobs inside its OWN workflow file. A single
#   "Required Gate" that transitively gates security.yml and
#   runtime-detection.yml is therefore impossible without collapsing those into
#   this file (which would destroy their stable "Security / ..." and
#   "Runtime Detection / ..." check names) or wrapping them as reusable
#   `workflow_call` workflows (which mangles the rendered check names into a
#   nested prefix).
#   Chosen design: "Required Gate" gates the jobs in THIS workflow only, and
#   branch protection is configured to require ALL of the following checks
#   independently:
#       Governance / validate
#       Governance / Documentation / links
#       Governance / Required Gate
#       Security / secret-scan
#       Workflow / actionlint
#       Runtime Detection / classify
#   This keeps gating genuinely meaningful: nothing is silently skipped, and a
#   failure in any workflow blocks the merge. Do NOT remove checks from the
#   branch protection list on the assumption that "Required Gate" covers them.

name: Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Show Python version
        run: python3 --version

      - name: Run governance validators
        run: bash scripts/validate-governance.sh

      - name: Assert no application runtime exists
        run: python3 scripts/validate-no-runtime.py

      - name: Test destructive-operations guard hook
        run: bash scripts/test-destructive-guard.sh

  links:
    name: Documentation / links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Validate relative markdown links
        run: python3 scripts/validate-markdown-links.py

  required-gate:
    name: Required Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - validate
      - links
    if: always()
    permissions:
      contents: read
    steps:
      - name: Evaluate dependency results
        env:
          RESULT_VALIDATE: ${{ needs.validate.result }}
          RESULT_LINKS: ${{ needs.links.result }}
        run: |
          set -euo pipefail
          echo "validate            : ${RESULT_VALIDATE}"
          echo "Documentation/links : ${RESULT_LINKS}"
          failed=0
          for r in "${RESULT_VALIDATE}" "${RESULT_LINKS}"; do
            if [ "${r}" != "success" ]; then
              failed=1
            fi
          done
          if [ "${failed}" -ne 0 ]; then
            echo "Required Gate: FAIL — one or more governance jobs did not succeed."
            exit 1
          fi
          echo "Required Gate: PASS — all governance jobs succeeded."

      - name: Fail on any failed or cancelled dependency
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled') ||
          contains(needs.*.result, 'skipped')
        run: |
          echo "Required Gate: FAIL — a dependency failed, was cancelled, or was skipped."
          exit 1
