---
# Aish Laundry App — Step 3 authentication, RBAC, audit, and redaction.
#
# Published required-check context (DO NOT RENAME): "authentication-rbac"
#
# Separate from tenant-isolation on purpose. Membership answers "does this user
# belong to this tenant"; role and permission answer "what may they do once
# inside it". They fail for different reasons and are diagnosed differently, so
# they get independent failure domains.
#
# Runs against authoritative PostgreSQL and real Redis: revocation, rate
# limiting, and session behaviour are storage-dependent, and an in-memory
# substitute would prove less than it appears to.
#
# No production secret, no provider, no deployment.

name: Authentication and RBAC

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: authentication-rbac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authentication-rbac:
    name: authentication-rbac
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: "postgres:18.4@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a"
        env:
          POSTGRES_USER: aish_ci
          POSTGRES_PASSWORD: CHANGEME_ci_only_not_secret
          POSTGRES_DB: aish_laundry_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aish_ci -d aish_laundry_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: "redis:8.2@sha256:d30960f73a599496d8b2802c97758bab6b1cd421fd06337f837779c47a57e1f3"
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_DATABASE: aish_laundry_ci
      DB_USERNAME: aish_ci
      DB_PASSWORD: CHANGEME_ci_only_not_secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"

    steps:
      - name: Checkout the exact candidate commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Record the exact SHA under verification
        run: |
          echo "candidate SHA: $(git rev-parse HEAD)"

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # 2.37.2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_pgsql, redis, bcmath
          coverage: none

      - name: Install backend dependencies from the lockfile
        run: |
          set -euo pipefail
          cd backend
          composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare the CI environment and schema
        run: |
          set -euo pipefail
          cd backend
          cp .env.example .env
          php artisan key:generate
          php artisan migrate:fresh --seed

      - name: Assert schema scope and that no shared default password was seeded
        run: |
          set -euo pipefail
          php backend/scripts/ci/assert-schema-scope.php --check-seeded-passwords

      - name: Authentication suite
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='AuthenticationTest|PasswordResetTest|SessionManagementTest'

      - name: Authentication adversarial matrix
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='AuthenticationAdversarialMatrix'

      - name: RBAC matrix and permission registry
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='Rbac|AuthorizationRegistry'

      - name: Tenant context, membership, and revocation
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='TenantContext'

      - name: Error contract and correlation IDs
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='ErrorContract'

      # Redaction is asserted on REAL EMITTED BYTES, not on the redactor in
      # isolation. The unit tests passed for weeks while the processor was never
      # attached to any channel and every log line leaked in clear.
      - name: Audit writing and log redaction, asserted on emitted bytes
        run: |
          set -euo pipefail
          cd backend
          php artisan test --filter='LogRedaction'

      - name: Assert the redaction processor is attached to every persistent channel
        run: |
          set -euo pipefail
          cd backend
          missing=0
          for ch in single daily; do
            if ! grep -A6 "'${ch}' =>" config/logging.php | grep -q "ConfigureLogRedaction"; then
              echo "  channel '${ch}' has NO redaction tap"; missing=1
            else
              echo "  channel '${ch}' taps ConfigureLogRedaction"
            fi
          done
          exit "${missing}"

      - name: Web session security contract
        run: |
          set -euo pipefail
          cd backend
          fail=0
          echo "== CORS must never combine a wildcard origin with credentials =="
          if grep -qE "'allowed_origins'\s*=>\s*\[\s*'\*'" config/cors.php 2>/dev/null \
             && grep -qE "'supports_credentials'\s*=>\s*true" config/cors.php 2>/dev/null; then
            echo "  wildcard origin with credentials — browser-enforced contradiction"; fail=1
          else
            echo "  no credentialed wildcard"
          fi
          echo "== session cookies must not be script-readable =="
          if grep -qE "'http_only'\s*=>\s*false" config/session.php 2>/dev/null; then
            echo "  http_only is false — token would be script-readable"; fail=1
          else
            echo "  http_only enforced"
          fi
          exit "${fail}"

      - name: Full backend suite
        run: |
          set -euo pipefail
          cd backend
          php artisan test

      - name: Security gate failure guidance
        if: failure()
        run: |
          echo "=================================================================="
          echo "AUTHENTICATION / RBAC GATE FAILED"
          echo "=================================================================="
          echo "Do NOT relax an assertion to make this green. A denial that stops"
          echo "reproducing is either a fixed defect or a weakened control, and"
          echo "the difference matters. Investigate the root cause, and if a"
          echo "control genuinely regressed, treat it as a security finding."
