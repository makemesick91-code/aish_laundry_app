---
# Aish Laundry App — security gates.
#
# Rendered check names (referenced by branch protection, do not rename):
#   "Security / secret-scan"
#   "Security / Workflow / actionlint"
#   "Security / threat-model"        (added in Step 1)
#
# actionlint is installed from a PINNED GitHub release tarball. No
# curl-pipe-to-shell is used anywhere. The download is verified by asserting the
# archive extracts and that the resulting binary reports the pinned version;
# a mismatch fails the job.

name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.7

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Scan repository for credential material
        run: bash scripts/validate-secrets.sh

      - name: Scan for public-repository safety violations
        run: bash scripts/validate-public-repository-safety.sh

  threat-model:
    name: threat-model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      # The gate that matters: a CRITICAL or HIGH threat with no mitigation fails
      # the build. See .claude/rules/21-threat-model-and-data-classification.md.
      - name: Validate the initial threat model
        run: python3 scripts/validate-threat-model.py

      - name: Validate the data classification model
        run: python3 scripts/validate-data-classification.py

  actionlint:
    name: Workflow / actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Download pinned actionlint release
        run: |
          set -euo pipefail
          version="${ACTIONLINT_VERSION}"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          mkdir -p "${RUNNER_TEMP}/actionlint"
          echo "Downloading ${url}"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 2 --max-time 120 \
            --output "${RUNNER_TEMP}/actionlint/${archive}" \
            "${url}"
          ls -l "${RUNNER_TEMP}/actionlint/${archive}"

      - name: Extract and verify actionlint binary
        run: |
          set -euo pipefail
          version="${ACTIONLINT_VERSION}"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          cd "${RUNNER_TEMP}/actionlint"
          # Supply-chain gate: the digest below is the authentic SHA-256 published
          # in actionlint_1.7.7_checksums.txt on the upstream release. A mismatch
          # means the artifact was tampered with or the pin drifted -> fail closed.
          expected="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          echo "${expected}  ${archive}" | sha256sum --check --strict -
          tar -xzf "${archive}"
          test -x ./actionlint
          reported="$(./actionlint -version | head -n 1 | tr -d '[:space:]')"
          echo "actionlint reports version: ${reported}"
          if [ "${reported}" != "${version}" ]; then
            echo "FAIL: expected actionlint ${version}, got ${reported}"
            exit 1
          fi

      - name: Lint GitHub Actions workflows
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/actionlint/actionlint" -color -verbose
