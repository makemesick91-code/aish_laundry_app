---
# Aish Laundry App — Step 2 design system gates.
#
# Rendered check name (referenced by branch protection, do not rename):
#   "design-system"
#
# Distinct job name so branch protection can require this gate separately from
# the Step 0 and Step 1 gates. Never reuse the ambiguous name "validate".
#
# SCOPE NOTE: Step 2 produces a design system SPECIFICATION, not a theme and
# not an application. The Flutter workspace is ABSENT and the backend runtime
# is ABSENT. Nothing here builds, renders, or tests a user interface, because
# no user interface exists. Application CI remains NOT APPLICABLE.

name: Design System

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: design-system-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  design-system:
    name: design-system
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Record the exact SHA under validation
        run: |
          set -euo pipefail
          echo "Validating commit: ${GITHUB_SHA}"

      - name: Validate that every mandated Step 2 artifact exists
        run: python3 scripts/validate-design-required-files.py

      - name: Validate design token structure and uniqueness
        run: python3 scripts/validate-design-tokens.py

      - name: Validate token references, layering, and circularity
        run: python3 scripts/validate-token-references.py

      - name: Recompute every colour contrast ratio
        run: python3 scripts/validate-color-contrast.py

      - name: Validate the typography foundation
        run: python3 scripts/validate-typography.py

      - name: Validate breakpoints, density, and the touch-target floor
        run: python3 scripts/validate-breakpoints.py

      - name: Validate the component catalog
        run: python3 scripts/validate-component-catalog.py

      - name: Validate the component state matrix
        run: python3 scripts/validate-component-states.py
