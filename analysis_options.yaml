# Shared analysis options for every workspace member.
#
# Generated design-token output is excluded from linting because it is machine
# written and byte-reproducible; a lint fix applied by hand there would be
# silently discarded by the next regeneration.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    todo: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_final_locals
    - prefer_single_quotes
    - unawaited_futures
    - use_super_parameters
