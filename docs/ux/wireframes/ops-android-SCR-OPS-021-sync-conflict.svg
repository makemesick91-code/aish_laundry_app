  <text x="14" y="46" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">SCR-OPS-021 | Aish Laundry Ops Android</text>
  <rect x="0" y="58" width="360" height="46" rx="0" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="10" y="76" font-family="sans-serif" font-size="10" fill="#1e293b" font-weight="normal" text-anchor="start">Laundry Bersih Sejahtera / Outlet Cempaka / Kasir</text>
  <text x="10" y="94" font-family="sans-serif" font-size="9" fill="#475569" font-weight="normal" text-anchor="start">Konteks tenant aktif dikunci di setiap layar</text>
  <rect x="238" y="74" width="112" height="20" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="294" y="88" font-family="sans-serif" font-size="10" fill="#1e293b" font-weight="bold" text-anchor="middle">GAGAL SINKRON</text>
  <rect x="14" y="114" width="332" height="66" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="134" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">AL-2026-000123</text>
  <text x="26" y="151" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Konflik pada catatan pembayaran</text>
  <text x="26" y="168" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tidak ada penimpaan otomatis</text>
  <rect x="14" y="188" width="332" height="76" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="208" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">Nilai server</text>
  <text x="26" y="225" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Dibayar Rp25.000 pada 14:30</text>
  <text x="26" y="242" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Sumber kebenaran akhir adalah server</text>
  <rect x="14" y="272" width="332" height="76" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="292" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">Nilai lokal</text>
  <text x="26" y="309" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Dibayar Rp79.000 pada 14:30</text>
  <text x="26" y="326" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tercatat luring di perangkat ini</text>
  <rect x="14" y="356" width="332" height="60" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="376" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">Tombol A: Pertahankan Nilai Server</text>
  <text x="26" y="393" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Nilai lokal disimpan sebagai catatan konflik</text>
  <rect x="14" y="424" width="332" height="60" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="444" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">Tombol B: Ajukan Nilai Lokal untuk Peninjauan</text>
