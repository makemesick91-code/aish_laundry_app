  <text x="26" y="512" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="start">Konflik uang selalu diputuskan manusia</text>
  <text x="26" y="529" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tidak pernah diselesaikan diam-diam oleh aplikasi</text>
  <rect x="14" y="636" width="332" height="48" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="180" y="666" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold" text-anchor="middle">Pilih Salah Satu Resolusi</text>
  <line x1="14" y1="692" x2="346" y2="692" stroke="#94a3b8" stroke-width="1"/>
  <text x="14" y="706" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="bold" text-anchor="start">LOW-FIDELITY — NOT IMPLEMENTED</text>
  <text x="14" y="717" font-family="sans-serif" font-size="9" fill="#475569" font-weight="normal" text-anchor="start">Wireframe tata letak saja. Bukan UI final. Data contoh fiktif.</text>
  <text x="346" y="706" font-family="sans-serif" font-size="9" fill="#475569" font-weight="normal" text-anchor="end">360x720</text>
