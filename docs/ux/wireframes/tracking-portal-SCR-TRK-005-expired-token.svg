  <text x="28" y="398" font-family="sans-serif" font-size="12" fill="#1e293b" font-weight="bold" text-anchor="start">Tidak ditampilkan</text>
  <text x="28" y="415" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tanpa alamat lengkap, tanpa nomor telepon lengkap</text>
