  <text x="28" y="197" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tautan berlaku terbatas dan dapat dicabut</text>
  <text x="28" y="214" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tidak ada data pesanan yang ditampilkan</text>
