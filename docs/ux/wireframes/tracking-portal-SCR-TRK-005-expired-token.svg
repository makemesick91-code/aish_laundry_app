  <text x="28" y="328" font-family="sans-serif" font-size="12" fill="#1e293b" font-weight="bold" text-anchor="start">Langkah pemulihan</text>
  <text x="28" y="345" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Minta tautan baru melalui outlet</text>
  <text x="28" y="362" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Tautan baru dikirim ke nomor terdaftar</text>
