  <text x="28" y="275" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Token pelacakan memiliki masa berlaku</text>
  <text x="28" y="292" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="normal" text-anchor="start">Hanya sidik token yang disimpan server</text>
